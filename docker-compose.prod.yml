# =============================================================================
# DP v0.1 — 生产环境覆盖
# =============================================================================
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 特性:
#   - HTTPS:443 (Let's Encrypt) + HTTP:80 (安全网)
#   - Split DNS: LAN 直连 + WAN Cloudflare Tunnel
#   - 资源限制
#   - 自动重启
#   - 启用隧道 profile
# =============================================================================

services:

  dp-db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  dp-cache-wf:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  dp-cache-bi:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  dp-wms-web:
    restart: always
    environment:
      ENV_NAME: production
      DEBUG: "false"
    deploy:
      resources:
        limits:
          memory: 256M

  dp-wf:
    restart: always
    environment:
      # ⚠️ N8N_ENCRYPTION_KEY 必须在 .env 中设置 (非 changeme_ 前缀)
      # ⚠️ WEBHOOK_URL 必须改为 https:// 公网地址 (n8n 2.x 不识别 N8N_ 前缀)
      # ⚠️ N8N_BASIC_AUTH 凭据必须更改默认值
      # 生产安全设置
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      # HTTPS 下 cookie 安全
      N8N_SECURE_COOKIE: "true"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  dp-wf-worker:
    restart: always
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  dp-bi:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  dp-gateway:
    restart: always
    ports:
      - "${DP_GATEWAY_PORT:-1080}:80"
      - "${DP_GATEWAY_SSL_PORT:-1443}:443"
    volumes:
      - ./infrastructure/nginx/conf.d-prod:/etc/nginx/conf.d:ro
      - ${DP_DATA_DIR}/certbot:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 256M

  dp-wms-test:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  dp-tunnel:
    restart: always
    profiles: []
    deploy:
      resources:
        limits:
          memory: 128M

  # ======================== SSO (profile: sso) ========================
  dp-sso:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  dp-cache-sso:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  # ======================== 监控 (profile: monitoring) ========================
  dp-prometheus:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    ulimits:
      nofile: 65536

  dp-alertmanager:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  dp-grafana:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  dp-node-exporter:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  dp-cadvisor:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  dp-pg-exporter:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  dp-redis-exporter-wf:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  dp-redis-exporter-bi:
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  # ======================== Let's Encrypt 证书管理 ========================
  # 首次: docker compose --profile certbot run --rm dp-certbot
  # 续期: crontab → scripts/cert-renew.sh
  dp-certbot:
    image: certbot/dns-cloudflare
    container_name: dp-certbot
    volumes:
      - ${DP_DATA_DIR}/certbot:/etc/letsencrypt
      - ./infrastructure/certbot/cloudflare.ini:/etc/cloudflare.ini:ro
    entrypoint: certbot
    command: >
      certonly
      --dns-cloudflare
      --dns-cloudflare-credentials /etc/cloudflare.ini
      --dns-cloudflare-propagation-seconds 30
      -d "*.example.com" -d "example.com"
      --agree-tos --non-interactive
      --email ${DP_CERTBOT_EMAIL:-admin@example.com}
      --keep-until-expiring
    profiles:
      - certbot

  # ======================== Split DNS (可选) ========================
  # 仅当路由器不支持静态 DNS 时使用
  # 启动: docker compose --profile dns up -d dp-dns
  dp-dns:
    image: dockurr/dnsmasq
    container_name: dp-dns
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    cap_add:
      - NET_ADMIN
    volumes:
      - ./infrastructure/dns/dnsmasq.conf:/etc/dnsmasq.conf:ro
    profiles:
      - dns
    deploy:
      resources:
        limits:
          memory: 32M
