<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>销售订单 - WMS</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="shared.css?v=phase20.12">
    <link rel="stylesheet" href="print.css?v=phase20.12">
</head>

<body>
    <div class="beep-indicator" id="beepIndicator">&#10003;</div>
    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-nav">
                <a href="index.html" class="back-link no-print" onclick="releaseDocumentLock()">&#8592;</a>
                <div>
                    <span class="doc-badge-lg" id="pageBadge"></span>
                    <h1 data-i18n="so.title" data-short-title="SO">销售拣货 SO</h1>
                    <p data-i18n="so.subtitle">扫描或输入销售订单号，执行拣货出库</p>
                </div>
                <button class="btn-logout no-print" onclick="logout()" data-i18n="logout">退出</button>
            </div>
            <div class="print-qr hidden" id="printQr"></div>
        </div>

        <div class="card no-print">
            <div class="card-title" data-i18n="po.query">查询订单</div>
            <div class="form-group">
                <input type="text" id="scanInput" class="form-input scan-input" placeholder="扫描条码或输入单号..." data-i18n-placeholder="po.scan_hint"
                    autocomplete="off" autocorrect="off">
                <div class="form-hint">输入SAP销售订单号或扫描SO26000000条码</div>
            </div>
        </div>

        <div class="card hidden" id="orderCard">
            <div class="card-title" data-i18n="po.order_info">订单信息</div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label" data-i18n="field.doc_num">订单号</span>
                    <span class="info-value" id="docNum">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-i18n="field.customer">客户</span>
                    <span class="info-value" id="bpName">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-i18n="field.delivery_date">交货日</span>
                    <span class="info-value" id="dueDate">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-i18n="field.sap_status">SAP状态</span>
                    <span class="info-value" id="docStatus">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-i18n="field.wms_status">WMS状态</span>
                    <span class="info-value" id="wmsStatus">-</span>
                </div>
                <div class="info-item hidden" id="ddSourceDocItem">
                    <span class="info-label">DD原单号</span>
                    <span class="info-value" id="ddSourceDocs" style="font-size:0.85rem;">-</span>
                </div>
            </div>
        </div>

        <div class="card hidden" id="linesCard">
            <div class="card-title" data-i18n="so.line_items">行项目 (拣货)</div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="col-line" data-i18n="field.line_num">行</th>
                            <th class="col-item" data-i18n="field.item_code">物料</th>
                            <th class="col-name" data-i18n="field.item_name">名称</th>
                            <th class="col-qty" data-i18n="field.planned_qty">订单数</th>
                            <th class="col-qty" data-i18n="so.delivered">已发</th>
                            <th class="col-qty" data-i18n="so.pending_pick">待拣</th>
                            <th class="col-whs" data-i18n="field.warehouse">仓库</th>
                            <th class="col-barcode" data-i18n="field.barcode">条码</th>
                            <th class="action-col no-print">操作</th>
                        </tr>
                    </thead>
                    <tbody id="linesBody"></tbody>
                </table>
            </div>
        </div>

        <div class="card hidden" id="pickCard">
            <div class="card-title">拣货录入 - <span id="pickItemCode"></span></div>
            <form id="pickForm" onsubmit="handleSubmit(event)" novalidate>
                <input type="hidden" id="selectedLine">
                <div class="form-group">
                    <label class="form-label" data-i18n="so.pick_qty">拣货数量 *</label>
                    <input type="number" id="pickQty" class="form-input number-input" step="0.0001" min="0.0001"
                        required onclick="this.select()" onfocus="this.select()"
                        placeholder="输入拣货数量" data-i18n-placeholder="so.pick_qty_hint">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="field.operator">操作人 *</label>
                    <input type="text" id="pickUser" class="form-input" required
                        placeholder="操作人姓名" data-i18n-placeholder="field.operator_placeholder">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="common.remark">备注</label>
                    <textarea id="pickRemark" class="form-input form-textarea"
                        placeholder="选填备注" data-i18n-placeholder="field.remark_placeholder"></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="so.submit_pick">确认拣货</button>
                    <button type="button" class="btn btn-outline" onclick="cancelPick()" data-i18n="common.cancel">取消</button>
                </div>
            </form>
        </div>

        <div class="card hidden" id="historyCard">
            <div class="card-title" data-i18n="so.history">拣货历史</div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th data-i18n="field.time">时间</th>
                            <th data-i18n="field.item_code">物料</th>
                            <th data-i18n="field.item_name">名称</th>
                            <th data-i18n="field.quantity">数量</th>
                            <th data-i18n="field.operator">操作人</th>
                            <th data-i18n="common.remark">备注</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="6" class="no-data" data-i18n="common.no_data">暂无记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 一键拣货 -->
        <div class="card hidden no-print" id="batchCard">
            <button type="button" class="btn-oneclick" onclick="oneClickPickAll()">
                ⚡ 一键拣货 (所有行剩余数量)
            </button>
        </div>

        <div class="card hidden no-print" id="actionCard">
            <div class="btn-group">
                <button class="btn btn-outline" onclick="printDocument()" data-i18n="common.print_doc">打印单据</button>
                <button class="btn btn-outline" onclick="printBarcode()" data-i18n="common.print_barcode">打印条码</button>
                <button class="btn btn-danger" onclick="resetPage()" data-i18n="common.re_query">重新查询</button>
            </div>
        </div>

        <div class="print-footer hidden">
            WMS 销售订单拣货单 | 打印时间: <span id="printTime"></span>
        </div>
        <div class="version-footer no-print" data-i18n="app.version">WMS @Foodsaid 维护</div>
    </div>

    <script defer src="vendor/JsBarcode.all.min.js"></script>
    <script defer src="vendor/qrcode.min.js"></script>
    <script src="env.js"></script>
    <script src="shared.js?v=phase20.12"></script>
    <script src="lang.js?v=phase20.12"></script>
    <script defer src="vendor/html5-qrcode.min.js?v=phase20.12b"></script>
    <script src="camera-fallback.js?v=phase20.12"></script>
    <script src="so.js?v=phase20.12"></script>
</body>

</html>
