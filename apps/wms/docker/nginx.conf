server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ---- env.js 禁止缓存 (运行时生成，每次部署可能变化) ----
    # 优先从容器内部独立目录读取，避免多容器 bind-mount 互相覆盖
    location = /env.js {
        root /var/run/wms-env;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /env.js =404;
    }

    # ---- 缓存版本化静态资源 (?v=phaseX.Y) ----
    location ~* \.(js|css|svg)$ {
        if ($args ~* "v=") {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        try_files $uri =404;
    }

    # ---- 静态文件回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- 屏蔽构建文件 (dev bind-mount 包含 docker/ 子目录) ----
    location /docker/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- 屏蔽隐藏文件 ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
