<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - 登录</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1e40af;
            letter-spacing: -0.5px;
        }
        .logo p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            color: #111827;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #2563eb;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #1d4ed8; }
        .btn-login:disabled { background: #93c5fd; cursor: not-allowed; }
        .error-msg {
            display: none;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .footer-note {
            text-align: center;
            color: #9ca3af;
            font-size: 0.78rem;
            margin-top: 24px;
        }
        /* 语言切换器（共享与fixed版） */
        .lang-switcher { display: flex; gap: 3px; }
        .lang-btn {
            padding: 3px 7px;
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            transition: background 0.15s;
        }
        .lang-btn:hover, .lang-btn.active { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>WMS</h1>
            <p data-i18n="login.subtitle">仓库管理系统</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="username" data-i18n="login.username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" data-i18n-placeholder="login.username_placeholder" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password" data-i18n="login.password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" data-i18n-placeholder="login.password_placeholder" autocomplete="current-password">
            </div>
            <button class="btn-login" id="loginBtn" data-i18n="login.btn" onclick="doLogin()">登 录</button>
        </form>

        <div id="login-lang-switcher" style="display:flex;justify-content:center;gap:6px;margin-top:16px;"></div>
        <div class="footer-note">WMS &copy; 2026</div>
    </div>

    <script src="env.js"></script>
    <script src="login.js?v=phase20.12"></script>
    <!-- 多语言支持：登录前可切换中/英/泰 -->
    <script src="lang.js?v=phase20.12"></script>
</body>
</html>
