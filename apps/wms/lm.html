<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库位移动 - WMS</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="shared.css?v=phase20.15">
    <link rel="stylesheet" href="print.css?v=phase20.15">
</head>

<body>
    <div class="beep-indicator" id="beepIndicator">&#10003;</div>
    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-nav">
                <a href="index.html" class="back-link no-print">&#8592;</a>
                <div>
                    <span class="doc-badge-lg" id="pageBadge"></span>
                    <h1 data-i18n="lm.title" data-short-title="LM">库位移动 (LM)</h1>
                    <p data-i18n="lm.subtitle">在同一仓库内移动物料到不同库位</p>
                </div>
                <button class="btn-logout no-print" onclick="logout()" data-i18n="logout">退出</button>
            </div>
            <div class="print-qr hidden" id="printQr"></div>
        </div>

        <!-- 操作选择 -->
        <div class="card no-print" id="modeCard">
            <div class="card-title" data-i18n="lm.select_op">选择操作</div>
            <div class="btn-group">
                <button class="btn btn-primary btn-block" onclick="showCreateForm()" data-i18n="lm.new_move">新建移库单</button>
                <button class="btn btn-outline btn-block" onclick="showLoadForm()" data-i18n="lm.load_move">查看移库凭证</button>
            </div>
        </div>

        <!-- 新建移库 -->
        <div class="card hidden" id="createCard">
            <div class="card-title" data-i18n="lm.new_move">新建移库单</div>
            <form id="createForm" onsubmit="handleCreate(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="lm.whs_code">仓库代码 *</label>
                    <input type="text" id="createWhs" class="form-input" required
                        placeholder="仓库代码" data-i18n-placeholder="field.warehouse_placeholder">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="field.operator">操作人 *</label>
                    <input type="text" id="createUser" class="form-input" required
                        placeholder="操作人姓名" data-i18n-placeholder="field.operator_placeholder">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="common.remark">备注</label>
                    <textarea id="createRemark" class="form-input form-textarea"
                        placeholder="选填备注" data-i18n-placeholder="field.remark_placeholder"></textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="common.create">创建</button>
                    <button type="button" class="btn btn-outline" onclick="backToMode()" data-i18n="common.back">返回</button>
                </div>
            </form>
        </div>

        <!-- 加载已有 -->
        <div class="card hidden" id="loadCard">
            <div class="card-title" data-i18n="lm.load_move">查看移库凭证</div>
            <div class="form-group">
                <input type="text" id="loadInput" class="form-input scan-input"
                    placeholder="输入移库单号或扫描 LM20260208001 条码..."
                    data-i18n-placeholder="lm.load_hint">
            </div>
            <div class="btn-group">
                <button class="btn btn-outline" onclick="backToMode()" data-i18n="common.back">返回</button>
            </div>
        </div>

        <!-- 移库信息 -->
        <div class="card hidden" id="moveCard">
            <div class="card-title" data-i18n="lm.move_info">移库信息</div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label" data-i18n="field.doc_num">移库单号</span>
                    <span class="info-value" id="docNum">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-i18n="field.warehouse">仓库</span>
                    <span class="info-value" id="warehouse">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-i18n="field.operator">操作人</span>
                    <span class="info-value" id="moveUser">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label" data-i18n="lm.moved_count">已移动</span>
                    <span class="info-value highlight" id="movedItems">0</span>
                </div>
            </div>
        </div>

        <!-- 移库录入 -->
        <div class="card hidden" id="inputCard">
            <div class="card-title" data-i18n="lm.move_entry">移库录入</div>
            <form id="moveForm" onsubmit="handleMove(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="lm.scan_item">扫描物料条码 *</label>
                    <input type="text" id="itemScan" class="form-input scan-input"
                        placeholder="扫描物料条码..." data-i18n-placeholder="lm.scan_item_hint">
                </div>
                <div class="hidden" id="moveFields">
                    <div class="info-grid mb-md">
                        <div class="info-item">
                            <span class="info-label" data-i18n="field.item_code">物料</span>
                            <span class="info-value" id="scanItemCode">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label" data-i18n="field.item_name">名称</span>
                            <span class="info-value" id="scanItemName">-</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="lm.from_bin">源库位 *</label>
                        <div style="display:flex;gap:6px;">
                            <input type="text" id="fromBin" class="form-input" placeholder="输入或扫描源库位"
                                data-i18n-placeholder="lm.from_bin_hint" required style="flex:1;">
                            <button type="button" class="btn btn-outline" onclick="addBinToDict('fromBin')" title="新增到库位字典" style="padding:10px 16px;font-size:1.1rem;flex-shrink:0;min-width:44px;min-height:44px;">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="lm.to_bin">目标库位 *</label>
                        <div style="display:flex;gap:6px;">
                            <input type="text" id="toBin" class="form-input" placeholder="输入或扫描目标库位"
                                data-i18n-placeholder="lm.to_bin_hint" required style="flex:1;">
                            <button type="button" class="btn btn-outline" onclick="addBinToDict('toBin')" title="新增到库位字典" style="padding:10px 16px;font-size:1.1rem;flex-shrink:0;min-width:44px;min-height:44px;">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="lm.move_qty">移动数量 *</label>
                        <input type="number" id="moveQty" class="form-input number-input" step="0.0001" min="0.0001"
                            required onclick="this.select()" onfocus="this.select()"
                            placeholder="输入移动数量" data-i18n-placeholder="lm.move_qty_hint">
                    </div>
                    <div class="form-group">
                        <label class="form-label" data-i18n="common.remark">备注</label>
                        <textarea id="moveRemark" class="form-input form-textarea"
                            placeholder="选填备注" data-i18n-placeholder="field.remark_placeholder"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="lm.add_line">添加到移库清单</button>
                </div>
            </form>
        </div>

        <!-- 待提交清单 -->
        <div class="card hidden" id="pendingCard">
            <div class="card-title">待提交清单 <span id="pendingCount" style="color:#f59e0b;">(0)</span></div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>物料</th>
                            <th>数量</th>
                            <th>源库位</th>
                            <th>目标库位</th>
                            <th>时间</th>
                            <th class="no-print">操作</th>
                        </tr>
                    </thead>
                    <tbody id="pendingBody">
                        <tr><td colspan="6" class="no-data">暂无待提交记录</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="btn-group no-print" style="margin-top:12px;">
                <button class="btn btn-primary btn-block" onclick="submitAllMoves()">批量提交</button>
                <button class="btn btn-outline" onclick="clearPending()">清空</button>
            </div>
        </div>

        <!-- 移库明细 -->
        <div class="card hidden" id="detailCard">
            <div class="card-title" data-i18n="lm.detail">移库明细</div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th data-i18n="field.item_code">物料</th>
                            <th data-i18n="field.item_name">名称</th>
                            <th data-i18n="field.barcode">条码</th>
                            <th data-i18n="field.qty">数量</th>
                            <th data-i18n="field.bin">库位</th>
                            <th data-i18n="lm.debit_credit">借/贷</th>
                            <th data-i18n="field.time">时间</th>
                        </tr>
                    </thead>
                    <tbody id="detailBody">
                        <tr>
                            <td colspan="7" class="no-data" data-i18n="common.no_data">暂无记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card hidden no-print" id="actionCard">
            <div class="btn-group">
                <button class="btn btn-success" onclick="completeMove()" data-i18n="lm.complete">完成移库</button>
                <button class="btn btn-outline" onclick="printDocument()" data-i18n="common.print">打印单据</button>
                <button class="btn btn-danger" onclick="backToMode()" data-i18n="common.back">返回</button>
            </div>
        </div>

        <div class="print-footer hidden">
            WMS 库位移动单 | 打印时间: <span id="printTime"></span>
        </div>
        <div class="version-footer no-print" data-i18n="app.version">WMS @Foodsaid 维护</div>
    </div>

    <script defer src="vendor/JsBarcode.all.min.js"></script>
    <script defer src="vendor/qrcode.min.js"></script>
    <script src="env.js"></script>
    <script src="shared.js?v=phase20.15"></script>
    <script src="lang.js?v=phase20.15"></script>
    <script defer src="vendor/html5-qrcode.min.js?v=phase20.15b"></script>
    <script src="camera-fallback.js?v=phase20.15"></script>
    <script src="lm.js?v=phase20.15"></script>
</body>

</html>
