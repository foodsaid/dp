global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['cluster', 'alertname']
  group_wait: 30s
  group_interval: 10m
  repeat_interval: 6h
  routes:
    - match: { severity: critical }
      receiver: 'default'
      repeat_interval: 2h

receivers:
  - name: 'default'
    # 空 receiver: 告警仅在 Prometheus UI + Grafana 可见, 不外发通知
    # 生产上线前必须配置 webhook/email, 否则告警无人收到
