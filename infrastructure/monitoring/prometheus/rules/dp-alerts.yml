groups:
  # 1. Prometheus 自身
  - name: prometheus
    rules:
      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target {{ $labels.instance }} 不可达"
          description: "Prometheus 无法抓取 {{ $labels.job }}/{{ $labels.instance }} 超过 5 分钟"

      - alert: PrometheusHighMemory
        expr: process_resident_memory_bytes{job="prometheus"} > 536870912
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus 内存使用超过 512MB"
          description: "当前 {{ $value | humanize1024 }}B"

      - alert: PrometheusWALFsyncSlow
        expr: rate(prometheus_tsdb_wal_fsync_duration_seconds_sum[5m]) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus WAL fsync 延迟过高"
          description: "WAL fsync 速率 {{ $value | printf \"%.2f\" }}s/s, 可能导致数据滞后"

  # 2. 宿主机
  - name: node
    rules:
      - alert: HostDiskSpaceHigh
        expr: (1 - node_filesystem_avail_bytes{fstype!~"rootfs|tmpfs|overlay|vfat"} / node_filesystem_size_bytes{fstype!~"rootfs|tmpfs|overlay|vfat"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘使用率超过 85%"
          description: "挂载点 {{ $labels.mountpoint }} 使用率 {{ $value | printf \"%.1f\" }}%"

      - alert: HostInodeHigh
        expr: (1 - node_filesystem_files_free{fstype!~"rootfs|tmpfs|overlay|vfat"} / node_filesystem_files{fstype!~"rootfs|tmpfs|overlay|vfat"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘 inode 使用率超过 85%"
          description: "挂载点 {{ $labels.mountpoint }} inode 使用率 {{ $value | printf \"%.1f\" }}%"

      - alert: HostMemoryHigh
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "宿主机内存使用率超过 85%"
          description: "当前使用率 {{ $value | printf \"%.1f\" }}%"

      - alert: HostLoadHigh
        expr: node_load5 > on() count(count by (cpu) (node_cpu_seconds_total)) * 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "宿主机 5 分钟负载过高"
          description: "当前负载 {{ $value | printf \"%.1f\" }}"

  # 3. 宿主机 IO
  - name: node-io
    rules:
      - alert: HostIOSaturation
        expr: rate(node_disk_io_time_seconds_total{device!~"loop.*|ram.*"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘 IO 饱和度超过 80%"
          description: "设备 {{ $labels.device }} IO 利用率 {{ $value | printf \"%.1f\" }}"

  # 4. 容器
  - name: container
    rules:
      - alert: ContainerCPUHigh
        expr: sum(rate(container_cpu_usage_seconds_total{name!=""}[5m])) by (name) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器 {{ $labels.name }} CPU 使用率超过 80%"
          description: "当前 {{ $value | printf \"%.1f\" }}%"

      - alert: ContainerMemoryHigh
        expr: container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "容器 {{ $labels.name }} 内存使用率超过 85%"
          description: "当前 {{ $value | printf \"%.1f\" }}%"

      - alert: ContainerRestartFrequent
        expr: increase(container_restart_count{name!=""}[10m]) > 3
        labels:
          severity: critical
        annotations:
          summary: "容器 {{ $labels.name }} 频繁重启"
          description: "10 分钟内重启 {{ $value | printf \"%.0f\" }} 次"

  # 5. 服务健康 (按名称细分)
  - name: service-health
    rules:
      - alert: CAdvisorDown
        expr: up{job="cadvisor"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "cAdvisor 不可达"

      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node Exporter 不可达"

      - alert: PgExporterDown
        expr: up{job="postgres"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL Exporter 不可达"

      - alert: RedisExporterDown
        expr: up{job="redis"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis Exporter {{ $labels.redis_instance }} 不可达"

  # 6. n8n
  - name: n8n
    rules:
      - alert: N8nWorkflowFailRateHigh
        expr: |
          sum(rate(n8n_workflow_execution_total{status="error"}[5m]))
          /
          sum(rate(n8n_workflow_execution_total[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "n8n 工作流失败率超过 10%"
          description: "当前失败率 {{ $value | printf \"%.1f\" }}"

      - alert: N8nWorkflowP95LatencyHigh
        expr: |
          histogram_quantile(0.95,
            sum(rate(n8n_workflow_execution_duration_seconds_bucket[5m]))
            by (le, workflow_id)
          ) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "n8n 工作流 {{ $labels.workflow_id }} P95 延迟超过 30s"
          description: "当前 P95 {{ $value | printf \"%.1f\" }}s"

  # 7. 数据库
  - name: postgres
    rules:
      - alert: PgConnectionsHigh
        expr: pg_stat_activity_count / pg_settings_max_connections * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL 连接数超过 80%"
          description: "当前 {{ $value | printf \"%.1f\" }}% ({{ $labels.instance }})"

      - alert: PgLongTransaction
        expr: pg_stat_activity_max_tx_duration{datname!~"template.*"} > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL 存在超过 300s 的长事务"
          description: "最长事务 {{ $value | printf \"%.0f\" }}s"

  # 8. Redis
  - name: redis
    rules:
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis {{ $labels.redis_instance }} 内存使用率超过 80%"
          description: "当前 {{ $value | printf \"%.1f\" }}%"

      - alert: RedisHitRateLow
        expr: |
          redis_keyspace_hits_total
          /
          (redis_keyspace_hits_total + redis_keyspace_misses_total)
          < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis {{ $labels.redis_instance }} 命中率低于 90%"
          description: "当前命中率 {{ $value | printf \"%.2f\" }}"

      - alert: RedisSlowlogHigh
        expr: redis_slowlog_length > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis {{ $labels.redis_instance }} slowlog 积压超过 10"
          description: "当前 {{ $value | printf \"%.0f\" }} 条"

  # 9. 磁盘预测
  - name: disk-prediction
    rules:
      - alert: DiskWillFillIn4Hours
        expr: predict_linear(node_filesystem_free_bytes{fstype!~"rootfs|tmpfs|overlay|vfat"}[1h], 4 * 3600) < 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "磁盘 {{ $labels.mountpoint }} 预计 4 小时内写满"
          description: "基于过去 1 小时趋势线性预测"

  # 10. 核心服务
  - name: core-services
    rules:
      - alert: ServiceDown
        expr: up{job=~"n8n|postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "核心服务 {{ $labels.job }} 不可达"
          description: "{{ $labels.instance }} 已离线超过 2 分钟"
