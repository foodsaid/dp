# =============================================================================
# DP v0.1 — WMS 测试环境 nginx (dp-wms-test 容器内部)
# =============================================================================
# 职责: 静态文件服务 + API 代理到 dp-wf (n8n)
# 挂载: docker-compose.yml 中 volume 覆盖默认 nginx 配置
# 与生产容器 (dp-wms-web) 的区别:
#   - 内置 /api/ 代理 (生产由 dp-gateway 处理)
#   - X-Test-Environment 响应头
#   - X-Forwarded-Proto 透传上游网关值
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- 测试环境标识 ----
    add_header X-Test-Environment "true" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ---- API 代理 → n8n (proxy_pass 带完整路径，尾斜杠对齐) ----

    location /api/wms/ {
        proxy_pass http://dp-wf:5678/webhook/wms/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /api/webhook/ {
        proxy_pass http://dp-wf:5678/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /api/webhook-test/ {
        proxy_pass http://dp-wf:5678/webhook-test/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 10s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ---- env.js 禁止缓存 (运行时生成，每次部署可能变化) ----
    # 优先从容器内部独立目录读取，避免多容器 bind-mount 互相覆盖
    location = /env.js {
        root /var/run/wms-env;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /env.js =404;
    }

    # ---- 缓存版本化静态资源 (?v=phaseX.Y) ----
    location ~* \.(js|css|svg)$ {
        if ($args ~* "v=") {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
        try_files $uri =404;
    }

    # ---- 静态文件回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- 屏蔽构建文件 (dev bind-mount 包含 docker/ 子目录) ----
    location /docker/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- 屏蔽隐藏文件 ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
