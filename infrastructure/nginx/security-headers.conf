# =============================================================================
# DP — 安全响应头 (主站通用)
# =============================================================================
# 用途: 在有独立 add_header 的 location 中 include，防止 nginx 继承丢失
# nginx 规则: location 中有 add_header 时会覆盖 server 级所有 add_header
# =============================================================================

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self'" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), usb=()" always;
