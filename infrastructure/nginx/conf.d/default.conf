# =============================================================================
# DP v0.3 — nginx 网关路由配置 (SSO 集成)
# =============================================================================
# 架构: n8n 独立端口 (dev: :5678, prod: wf.example.com)
# 网关: WMS 前端 + BI + WMS API (webhook 转发到 n8n) + SSO (Authelia)
# =============================================================================
# SSO 开关: DP_SSO_ENABLED 控制 27-sso-auth-toggle.sh 生成:
#   true  → sso-auth.inc (auth_request) + sso-headers.inc (header 注入)
#   false → 两个空文件 (include 无效果, 各应用独立认证)
# =============================================================================
# /              → 导航页 (精确匹配, 公开 bypass SSO)
# /auth/         → dp-sso (Authelia 登录门户, 公开)
# /api/auth/whoami → dp-sso (统一身份端点, 无 auth_request)
# /wms/          → dp-wms-web    (P2 SSO 保护)
# /api/wms/      → dp-wf         (bypass, WMS 自有认证)
# /api/webhook/  → dp-wf         (bypass, n8n 自带 token)
# /superset/     → dp-bi         (P3 SSO + Remote-User)
# /grafana/      → dp-grafana    (P1 SSO + Auth Proxy)
# /prometheus/   → dp-prometheus  (P1 SSO 门禁)
# /alertmanager/ → dp-alertmanager (P1 SSO 门禁)
# /loki/         → dp-loki         (P1 SSO 门禁, 日志查询 API)
# /ai/           → 503 预留
# /bi            → 302 快捷入口
# /*             → 404 兜底 (防止未知路径被 BI 吞掉)
# =============================================================================

server {
    listen 80;
    listen 443 ssl;
    server_name _;

    # Docker 内置 DNS, 变量 proxy_pass 运行时解析
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 3s;

    # --- SSL (mkcert 自签证书, 本地开发 HTTPS 用) ---
    ssl_certificate     /etc/nginx/certs/local-cert.pem;
    ssl_certificate_key /etc/nginx/certs/local-key.pem;

    # 自动补斜杠时使用相对路径 (避免丢失端口号)
    absolute_redirect off;

    # 安全头 (公共片段, 避免子 location 的 add_header 覆盖)
    include /etc/nginx/security-headers.conf;

    # =========================================================================
    # Authelia SSO 门户 (公开)
    # =========================================================================
    # 登录 API 限速 (仅 firstfactor/secondfactor, 不拦截 UI/静态资源/logout)
    location ~ ^/auth/api/(firstfactor|secondfactor) {
        limit_req zone=sso_login burst=3 nodelay;
        limit_req_status 429;
        set $sso http://dp-sso:9091;
        proxy_pass $sso;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Original-URL $real_scheme://$http_host$request_uri;
        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_down;
    }

    # /auth/ 通用代理 (不限速, 服务 UI/静态资源/logout/health)
    location /auth/ {
        set $sso http://dp-sso:9091;
        proxy_pass $sso;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Original-URL $real_scheme://$http_host$request_uri;

        # WebSocket (Authelia 实时状态推送)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 登录页禁止缓存
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate";

        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_down;
    }

    # SSO 降级 (dp-sso 未运行)
    location @sso_down {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>SSO Unavailable</title></head><body style="font-family:system-ui;text-align:center;padding:60px"><h1>SSO 暂不可用</h1><p>统一认证服务未运行，请联系管理员。</p><p style="color:#888">docker compose --profile sso up -d</p></body></html>';
    }

    # SSO 无权限 → 外部 302 重定向到导航首页 (named location 产生真正的 Location 头)
    location @access_denied {
        # 无权限 → 302 回 landing, denied=1 阻止 landing JS 自动跳转 (防循环)
        return 302 /?denied=1&rd=$request_uri;
    }

    # Authelia 验证端点 (内部, auth_request 子请求调用)
    # 参考: https://www.authelia.com/integration/proxies/nginx/
    location /internal/authelia/authz {
        internal;
        set $sso_authz http://dp-sso:9091/auth/api/authz/auth-request;
        proxy_pass $sso_authz;

        # Authelia auth-request 必须 headers
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $real_scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Content-Length "";
        proxy_set_header Connection "";
        proxy_pass_request_body off;

        # 2s 超时: Authelia 挂时快速降级
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        proxy_send_timeout 2s;
        proxy_next_upstream error timeout invalid_header;
    }

    # 统一身份端点 (直接代理 Authelia /api/user/info, 无需 auth_request)
    # Authelia /api/user/info 自身验证 session cookie, 未登录返回 401
    location = /api/auth/whoami {
        set $sso_userinfo http://dp-sso:9091/auth/api/user/info;
        proxy_pass $sso_userinfo;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # 5s micro-cache (landing/WMS/portal 并发调用防 whoami storm)
        proxy_cache whoami_cache;
        proxy_cache_valid 200 5s;
        proxy_cache_key "$cookie_dp_sso_session";
        # 未登录时 cookie 为空 → 不缓存 (防止 401 被共享)
        proxy_cache_bypass $whoami_no_cache;
        proxy_no_cache $whoami_no_cache;

        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_down;
    }

    # =========================================================================
    # 导航首页 (精确匹配, 公开 bypass SSO)
    # =========================================================================
    location = / {
        root /usr/share/nginx/landing;
        try_files /index.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    # =========================================================================
    # 隐私政策 + 服务条款 (Google OAuth 品牌验证要求)
    # =========================================================================
    location = /privacy {
        root /usr/share/nginx/landing;
        try_files /privacy.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /privacy.html {
        root /usr/share/nginx/landing;
        try_files /privacy.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /terms {
        root /usr/share/nginx/landing;
        try_files /terms.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /terms.html {
        root /usr/share/nginx/landing;
        try_files /terms.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /logo-oauth.svg {
        root /usr/share/nginx/landing;
        include /etc/nginx/security-headers.conf;
        add_header Content-Type "image/svg+xml";
    }

    # =========================================================================
    # WMS 前端 (P2 阶段添加 SSO 保护, P1 暂保留独立认证)
    # =========================================================================
    # SSO 启用时各模块内置登录页 → 301 重定向 (精确匹配优先于前缀匹配)
    include /etc/nginx/dynamic/sso-login-redirects.inc;

    location /wms/ {
        include /etc/nginx/dynamic/sso-auth.inc;

        # Header 防伪造: 先清后设 (4 头全清)
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;

        # WMS 前端 CSP: Vue 运行时编译需要 unsafe-eval
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), usb=()" always;

        set $wms_backend http://dp-wms-web:80;
        rewrite ^/wms/(.*) /$1 break;
        proxy_pass $wms_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
    }

    # =========================================================================
    # WMS 业务 API (bypass SSO, n8n webhook 自有认证)
    # /api/wms/xxx → /webhook/wms/xxx
    # =========================================================================
    location /api/wms/ {
        set $wf_backend http://dp-wf:5678;
        rewrite ^/api/(.*)$ /webhook/$1 break;
        proxy_pass $wf_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;

        # 超时 (SAP 查询可能较慢)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # =========================================================================
    # n8n 原生 webhook 路径透传 (bypass SSO)
    # /api/webhook/xxx → /webhook/xxx
    # /api/webhook-test/xxx → /webhook-test/xxx
    # =========================================================================
    location /api/webhook/ {
        set $wf_backend http://dp-wf:5678;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $wf_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /api/webhook-test/ {
        set $wf_backend http://dp-wf:5678;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $wf_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # =========================================================================
    # BI 快捷入口 (大小写兼容, 内部重写不暴露实现细节)
    # /bi, /BI, /bi/ 均可访问, 浏览器 URL 保持不变
    # =========================================================================
    location ~* ^/bi/?$ {
        return 302 /superset/welcome/;
    }

    # =========================================================================
    # AI 智能体 (预留)
    # =========================================================================
    location /ai/ {
        default_type application/json;
        return 503 '{"error":"AI module coming soon","version":"v0.3"}';
    }

    # =========================================================================
    # 监控 (profile: monitoring, SSO 保护)
    # =========================================================================
    rewrite ^/grafana$ /grafana/ permanent;
    rewrite ^/prometheus$ /prometheus/ permanent;
    rewrite ^/alertmanager$ /alertmanager/ permanent;

    # Grafana 监控仪表板
    location /grafana/ {
        include /etc/nginx/dynamic/sso-auth.inc;

        # Header 防伪造: 先清后设 (4 头全清)
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;

        # Grafana 需要连 grafana.com (RSS/插件) + WebSocket (Live)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://grafana.com wss:; font-src 'self' data:; frame-ancestors 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), usb=()" always;

        set $grafana_backend http://dp-grafana:3000;
        proxy_pass $grafana_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @monitoring_down;
    }

    # Prometheus UI
    location /prometheus/ {
        include /etc/nginx/dynamic/sso-auth.inc;

        # Header 防伪造
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;

        set $prometheus_backend http://dp-prometheus:9090;
        proxy_pass $prometheus_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @monitoring_down;
    }

    # Alertmanager 告警管理
    location /alertmanager/ {
        include /etc/nginx/dynamic/sso-auth.inc;

        # Header 防伪造
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;

        set $alertmanager_backend http://dp-alertmanager:9093;
        proxy_pass $alertmanager_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @monitoring_down;
    }

    # Loki 日志查询 API
    location /loki/ {
        include /etc/nginx/dynamic/sso-auth.inc;

        # Header 防伪造
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;

        set $loki_backend http://dp-loki:3100;
        proxy_pass $loki_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @monitoring_down;
    }

    location @monitoring_down {
        default_type application/json;
        return 503 '{"error":"Monitoring not running","hint":"docker compose --profile monitoring up -d"}';
    }

    # =========================================================================
    # 健康检查端点 (公开, bypass SSO)
    # =========================================================================
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"dp-gateway"}';
    }

    # 屏蔽隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =========================================================================
    # BI 引擎路由 (显式前缀, 不再用 / 回退)
    # =========================================================================
    # BI /superset/ 主路由
    location /superset/ {
        include /etc/nginx/dynamic/sso-auth.inc;

        # Header 防伪造: 先清后设
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;

        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
    }

    # BI 静态资源 — 文件扩展名匹配 (bypass SSO, 与 Authelia bypass 规则一致)
    location ~ ^/(static/assets|assets)/.*\.(js|css|png|jpg|jpeg|svg|gif|ico|woff2?|ttf|eot|map)$ {
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        expires 7d;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
    }

    # BI 其余 static (非 assets, SSO 保护)
    location /static/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        expires 7d;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
    }

    # BI 其余路由 (显式枚举, 避免 / 回退吞掉未来 API)
    location ~ ^/(dashboard|chart|explore|sqllab|tabstateview|api/v1|login|logout|roles|users)(/|$) {
        include /etc/nginx/dynamic/sso-auth.inc;

        # Header 防伪造: 先清后设
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;

        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # =========================================================================
    # 兜底 404 (防止未知路径被 BI 吞掉)
    # =========================================================================
    location / {
        default_type application/json;
        return 404 '{"error":"Not Found","hint":"Check URL path"}';
    }
}

# =============================================================================
# n8n 编辑器 (wf.* 子域名, 不纳入 SSO)
# =============================================================================
server {
    listen 80;
    server_name ~^wf\..+$;

    # 安全头 (n8n 编辑器需要 unsafe-eval)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self' data:; frame-ancestors 'self'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=()" always;

    # n8n 静态资源 (JS/CSS/字体/图片 — 7天浏览器缓存)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
        set $wf_backend http://dp-wf:5678;
        proxy_pass $wf_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Forwarded-Host $host;
        expires 7d;
        include /etc/nginx/security-headers-wf.conf;
        add_header Cache-Control "public, immutable";
    }

    # 全部请求代理到 n8n
    location / {
        set $wf_backend http://dp-wf:5678;
        proxy_pass $wf_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket (n8n 编辑器实时更新 + 执行状态推送)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
