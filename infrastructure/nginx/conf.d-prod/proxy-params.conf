# =============================================================================
# DP v0.1 — 通用代理参数 (所有 server 块复用)
# =============================================================================
# 使用方式:
#   server {
#       set $x_proto http;  # 或 https
#       include /etc/nginx/conf.d/proxy-params.conf;
#       ...
#   }
# =============================================================================

# 通用 proxy headers
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $x_proto;
proxy_set_header X-Forwarded-Host  $host;

# 默认超时 (location 级可覆盖)
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# 安全 headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self' data:; frame-ancestors 'self'" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self), usb=()" always;
