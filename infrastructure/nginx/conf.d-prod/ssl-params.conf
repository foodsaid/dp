# =============================================================================
# DP v0.1 — SSL/TLS 参数 (Let's Encrypt 通配符证书)
# =============================================================================
# 所有 HTTPS server 块通过 include 引用此文件
# 证书路径: ${DP_DATA_DIR}/certbot/live/example.com/
# =============================================================================

ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:!aNULL:!MD5:!DSS;
ssl_session_cache   shared:SSL:50m;
ssl_session_timeout 1d;
ssl_prefer_server_ciphers on;

# OCSP Stapling — LE 通配符证书暂不支持, 稳定后可尝试开启
# ssl_stapling on;
# ssl_stapling_verify on;
# resolver 1.1.1.1 8.8.8.8 valid=300s;
# resolver_timeout 5s;

# HSTS (v0.3.2 启用, 初始 max-age=604800 即 7 天, 稳定后可提升至 31536000)
# 提交 https://hstspreload.org 需 max-age>=31536000 + includeSubDomains + preload
add_header Strict-Transport-Security "max-age=604800; includeSubDomains" always;
