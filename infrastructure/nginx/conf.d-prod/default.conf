        return 200 '{"status":"ok","service":"dp-gateway","proto":"https"}';
    }

    # ===================== 隐藏文件屏蔽 =====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===================== BI 引擎路由 (显式前缀) =====================
    location /superset/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
    }

    location ~ ^/(static/assets|assets)/.*\.(js|css|png|jpg|jpeg|svg|gif|ico|woff2?|ttf|eot|map)$ {
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        expires 7d;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        expires 7d;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/(dashboard|chart|explore|sqllab|tabstateview|api/v1|login|logout|roles|users)(/|$) {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ===================== 兜底 404 =====================
    location / {
        default_type application/json;
        return 404 '{"error":"Not Found","hint":"Check URL path"}';
    }
}

# =====================================================================
# server 3: HTTP:80 wf.example.com — n8n 编辑器 (证书故障安全网)
# =====================================================================
server {
    listen 80;
    server_name wf.example.com;

    set $x_proto http;
    include /etc/nginx/conf.d/proxy-params.conf;

    # n8n 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
        set $wf_backend http://dp-wf:5678;
        proxy_pass $wf_backend;
        expires 7d;
        include /etc/nginx/security-headers-wf.conf;
        add_header Cache-Control "public, immutable";
    }

    # 全部请求代理到 n8n (含 WebSocket)
    location / {
        set $wf_backend http://dp-wf:5678;
        proxy_pass $wf_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    location = /healthz {
        set $wf_backend http://dp-wf:5678;
        proxy_pass $wf_backend;
        access_log off;
    }
}


# =====================================================================
