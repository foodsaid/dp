# =============================================================================
# DP v0.3 — 生产环境路由 (HTTPS 主入口 + HTTP 安全网 + SSO 集成)
# =============================================================================
# 架构: 单 Origin (app.example.com) + Split DNS + Let's Encrypt
# 路径:
#   LAN:  PDA → WiFi → DNS → dp-gateway:443 (LE cert)
#   WAN:  User → Cloudflare → cloudflared → dp-gateway:443
# =============================================================================
# server 1: HTTP:80  app.example.com  — 完整路由 (证书故障安全网)
# server 2: HTTPS:443 app.example.com — 主入口 (LAN + Tunnel 统一)
# server 3: HTTP:80  wf.example.com     — n8n 编辑器 (安全网)
# server 4: HTTPS:443 wf.example.com    — n8n 编辑器 (主入口)
# WMS 测试网关: 由 envsubst 动态生成 → /etc/nginx/dynamic/wms-test.conf
# =============================================================================

# 全局 proxy 容错
proxy_next_upstream error timeout http_502 http_503 http_504;
proxy_next_upstream_tries 2;

# =====================================================================
# server 1: HTTP:80 app.example.com — 完整路由 (证书故障安全网)
# =====================================================================
server {
    listen 80;
    server_name app.example.com;

    absolute_redirect off;

    set $x_proto http;
    include /etc/nginx/conf.d/proxy-params.conf;

    # ===================== Authelia SSO 门户 (公开) =====================
    location ~ ^/auth/api/(firstfactor|secondfactor) {
        limit_req zone=sso_login burst=3 nodelay;
        limit_req_status 429;
        set $sso http://dp-sso:9091;
        proxy_pass $sso;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Original-URL $real_scheme://$http_host$request_uri;
        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_down;
    }

    location /auth/ {
        set $sso http://dp-sso:9091;
        proxy_pass $sso;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Original-URL $real_scheme://$http_host$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_down;
    }

    location @sso_down {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>SSO Unavailable</title></head><body style="font-family:system-ui;text-align:center;padding:60px"><h1>SSO 暂不可用</h1><p>统一认证服务未运行，请联系管理员。</p><p style="color:#888">docker compose --profile sso up -d</p></body></html>';
    }

    location @access_denied {
        return 302 /?denied=1&rd=$request_uri;
    }

    location /internal/authelia/authz {
        internal;
        set $sso_authz http://dp-sso:9091/auth/api/authz/auth-request;
        proxy_pass $sso_authz;
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $real_scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Content-Length "";
        proxy_set_header Connection "";
        proxy_pass_request_body off;
        proxy_connect_timeout 2s;
        proxy_read_timeout 2s;
        proxy_send_timeout 2s;
        proxy_next_upstream error timeout invalid_header;
    }

    location = /api/auth/whoami {
        set $sso_userinfo http://dp-sso:9091/auth/api/user/info;
        proxy_pass $sso_userinfo;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $x_proto;
        proxy_cache whoami_cache;
        proxy_cache_valid 200 5s;
        proxy_cache_key "$cookie_dp_sso_session";
        proxy_cache_bypass $whoami_no_cache;
        proxy_no_cache $whoami_no_cache;
        proxy_intercept_errors on;
        error_page 502 503 504 = @sso_down;
    }

    # ===================== 导航首页 =====================
    location = / {
        root /usr/share/nginx/landing;
        try_files /index.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    # ===================== 隐私政策 + 服务条款 (Google OAuth) =====================
    location = /privacy {
        root /usr/share/nginx/landing;
        try_files /privacy.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /privacy.html {
        root /usr/share/nginx/landing;
        try_files /privacy.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /terms {
        root /usr/share/nginx/landing;
        try_files /terms.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /terms.html {
        root /usr/share/nginx/landing;
        try_files /terms.html =404;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache";
    }
    location = /logo-oauth.svg {
        root /usr/share/nginx/landing;
        include /etc/nginx/security-headers.conf;
        add_header Content-Type "image/svg+xml";
    }

    # ===================== WMS 前端 =====================
    # SSO 启用时各模块内置登录页 → 301 重定向
    include /etc/nginx/dynamic/sso-login-redirects.inc;

    location /wms/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $wms_backend http://dp-wms-web:80;
        rewrite ^/wms/(.*) /$1 break;
        proxy_pass $wms_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
    }

    # ===================== WMS API → n8n webhook (bypass SSO) =====================
    location /api/wms/ {
        set $wf_backend http://dp-wf:5678;
        rewrite ^/api/(.*)$ /webhook/$1 break;
        proxy_pass $wf_backend;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ===================== n8n webhook 透传 (bypass SSO) =====================
    location /api/webhook/ {
        set $wf_backend http://dp-wf:5678;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $wf_backend;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /api/webhook-test/ {
        set $wf_backend http://dp-wf:5678;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $wf_backend;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ===================== BI 快捷入口 =====================
    location ~* ^/bi/?$ {
        return 302 /superset/welcome/;
    }

    # ===================== AI 预留 =====================
    location /ai/ {
        default_type application/json;
        return 503 '{"error":"AI module coming soon","version":"v0.3"}';
    }

    # ===================== 监控 (SSO 保护) =====================
    rewrite ^/grafana$ /grafana/ permanent;
    rewrite ^/prometheus$ /prometheus/ permanent;
    rewrite ^/alertmanager$ /alertmanager/ permanent;

    location /grafana/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $grafana_backend http://dp-grafana:3000;
        proxy_pass $grafana_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @monitoring_down;
    }

    location /prometheus/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $prometheus_backend http://dp-prometheus:9090;
        proxy_pass $prometheus_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @monitoring_down;
    }

    location /alertmanager/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $alertmanager_backend http://dp-alertmanager:9093;
        proxy_pass $alertmanager_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
        proxy_read_timeout 60s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @monitoring_down;
    }

    location @monitoring_down {
        default_type application/json;
        return 503 '{"error":"Monitoring not running","hint":"docker compose --profile monitoring up -d"}';
    }

    # ===================== 健康检查 =====================
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"dp-gateway","proto":"http"}';
    }

    # ===================== 隐藏文件屏蔽 =====================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ===================== BI 引擎路由 (显式前缀) =====================
    location /superset/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
    }

    location ~ ^/(static/assets|assets)/.*\.(js|css|png|jpg|jpeg|svg|gif|ico|woff2?|ttf|eot|map)$ {
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        expires 7d;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
    }

    location /static/ {
        include /etc/nginx/dynamic/sso-auth.inc;
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        expires 7d;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
    }

    location ~ ^/(dashboard|chart|explore|sqllab|tabstateview|api/v1|login|logout|roles|users)(/|$) {
        include /etc/nginx/dynamic/sso-auth.inc;
        proxy_set_header X-Forwarded-User "";
        proxy_set_header Remote-User "";
        proxy_set_header X-Forwarded-Groups "";
        proxy_set_header X-Forwarded-Email "";
        include /etc/nginx/dynamic/sso-headers.inc;
        set $bi_backend http://dp-bi:8088;
        proxy_pass $bi_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ===================== 兜底 404 =====================
    location / {
        default_type application/json;
        return 404 '{"error":"Not Found","hint":"Check URL path"}';
    }
}

# =====================================================================
# server 2: HTTPS:443 app.example.com — 主入口 (LAN + Tunnel 统一)
# =====================================================================
server {
