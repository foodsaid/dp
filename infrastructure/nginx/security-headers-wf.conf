# =============================================================================
# DP — 安全响应头 (n8n 编辑器)
# =============================================================================
# 与 security-headers.conf 的区别:
#   - script-src 增加 'unsafe-eval' (n8n 编辑器 JS 沙盒需要)
#   - connect-src 增加 wss: (n8n WebSocket 实时推送)
#   - camera=() 无 self (n8n 编辑器不需要摄像头)
# =============================================================================

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self' data:; frame-ancestors 'self'" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), usb=()" always;
