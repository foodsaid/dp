# =============================================================================
# DP v0.3 — nginx 网关主配置
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 请求体大小 (文件上传)
    client_max_body_size 50m;

    # SSO 多 proxy_set_header 导致 hash 溢出
    proxy_headers_hash_max_size 1024;
    proxy_headers_hash_bucket_size 128;

    # 代理缓冲优化 (BI/n8n 响应体较大，默认 4-8k 远远不够)
    proxy_buffer_size   16k;
    proxy_buffers       8 32k;
    proxy_busy_buffers_size 64k;
    proxy_temp_file_write_size 64k;

    # WebSocket 升级映射
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Cloudflare Tunnel 透传真实协议 (防止 nginx 覆写为 http)
    # 无 X-Forwarded-Proto 头时 (开发环境直连) 回退到 $scheme
    map $http_x_forwarded_proto $real_scheme {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # =========================================================================
    # SSO 相关配置 (DP_SSO_ENABLED=true 时生效)
    # =========================================================================

    # Docker DNS (统一配置, 各 location 不再重复)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 3s;

    # SSO 登录限速 (防暴力破解, 1r/s burst 3)
    # 仅用 IP 做限速因子 (不含 User-Agent — 攻击者可随机伪造 UA 绕过限速并撑爆内存池)
    # NAT 共用 IP 场景靠 burst=3 缓冲 (3 人同时登录仍可通过)
    limit_req_zone $binary_remote_addr zone=sso_login:10m rate=1r/s;

    # whoami micro-cache (5s, 防 landing/WMS/portal 并发 whoami storm)
    proxy_cache_path /var/cache/nginx/whoami levels=1:2 keys_zone=whoami_cache:1m max_size=10m inactive=10s;

    # whoami 缓存控制: 未登录 (cookie 空) 不缓存, 防 401 被共享
    map $cookie_dp_sso_session $whoami_no_cache {
        ""      1;       # cookie 空 → 不缓存
        default 0;       # cookie 有值 → 缓存 5s
    }

    # 内部状态端点 (仅 Docker 内网, 排障时 curl 查看连接数)
    server {
        listen 18222;
        server_name _;
        location /stub_status {
            stub_status;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all;
            access_log off;
        }
    }

    include /etc/nginx/conf.d/*.conf;

    # 动态配置 (由 entrypoint 脚本通过 envsubst 生成, 如 WMS 测试网关)
    include /etc/nginx/dynamic/*.conf;
}
