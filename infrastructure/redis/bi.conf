# =============================================================================
# DP v0.1 — Redis 配置: BI 缓存 (dp-cache-bi)
# db:0 = Superset 缓存
# db:1 = Celery Broker (Superset 异步任务)
# db:2 = AI 预留
# =============================================================================
# 安全: Docker 网络隔离 + requirepass (--requirepass 参数注入) 双层防护
# =============================================================================

# 网络绑定 (容器内 0.0.0.0, Docker 网络隔离为安全边界)
bind 0.0.0.0
protected-mode no

# 禁用危险命令 (防误操作或容器内 RCE 扩大影响)
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command KEYS ""

# 持久化 (RDB 快照, 缓存数据丢失可接受)
save 300 10
save 900 1

# AOF 关闭 (纯缓存场景，丢失可恢复)
appendonly no

# 内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 数据库数量
databases 4

# 日志级别
loglevel notice

# 超时
timeout 300

# TCP keepalive
tcp-keepalive 60
