# =============================================================================
# DP v0.3 — Redis 配置: SSO 会话 (dp-cache-sso)
# db:0 = Authelia 会话存储
# =============================================================================
# 独立实例: 与 dp-cache-bi (allkeys-lru) 隔离
# 原因: eviction 是实例级 (非 db 级), allkeys-lru 会踢 session → 随机登出
# 安全: Docker 网络隔离 + requirepass (--requirepass 参数注入) 双层防护
# =============================================================================

# 网络绑定 (容器内 0.0.0.0, Docker 网络隔离为安全边界)
bind 0.0.0.0
protected-mode no

# 禁用危险命令 (防误操作或容器内 RCE 扩大影响)
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command KEYS ""

# 纯内存模式 (session 是短期数据, 重启后用户重新登录即可)
save ""
appendonly no

# 内存限制 (128MB 足够 <50 用户会话)
maxmemory 128mb
maxmemory-policy noeviction

# 数据库数量
databases 1

# 日志级别
loglevel notice

# 超时 (空闲连接 300秒后断开)
timeout 300

# TCP keepalive
tcp-keepalive 60
