# =============================================================================
# DP v0.1 — Redis 配置: 工作流队列 (dp-cache-wf)
# db:0 = Bull 队列 (n8n 任务执行)
# db:1 = WMS 会话缓存
# =============================================================================
# 安全: Docker 网络隔离 + requirepass (--requirepass 参数注入) 双层防护
# =============================================================================

# 网络绑定 (容器内 0.0.0.0, Docker 网络隔离为安全边界)
bind 0.0.0.0
protected-mode no

# 禁用危险命令 (防误操作或容器内 RCE 扩大影响)
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
rename-command KEYS ""

# 持久化 (RDB 快照)
save 60 100
save 300 10
save 900 1

# AOF 持久化 (队列数据不能丢)
appendonly yes
appendfsync everysec

# 内存限制 (生产环境建议 256M)
maxmemory 256mb
maxmemory-policy noeviction

# 数据库数量
databases 4

# 日志级别
loglevel notice

# 超时 (空闲连接 300秒后断开)
timeout 300

# TCP keepalive
tcp-keepalive 60
